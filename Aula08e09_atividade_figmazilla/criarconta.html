<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=New+Amsterdam&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body class="bodycriarconta">
    <form action="#" class="criarconta2">
        <div class="dados">
            <h1>Cadastro</h1>
            <div class="nomeusurariocriarconta">
                <label for="">Nome de Usuário</label>
                <input type="text">
            </div>
            <div class="emailcriarconta">
                <label for="">E-mail</label>
                <input type="email">
            </div>
            <div class="senhacriarconta">
                <label for="">Senha</label>
                <input type="password">
            </div>
            <div class="confirmarsenhacriarconta">
            <label for="">Confirmar Senha</label>
            <input type="password">
            </div>
        </div>
        <div class="entraroutros">
            <h6>Ou, se preferir</h6>
            <a href="">Entre com o Google</a>
            <a href="">Entre com o Steam</a>
            <a href="">Entre com o Discord</a>
        </div>
    </form>
    <img src="source/img/Figmazilla.png" alt="" class="fogofigmazilla">
</body>
</html>
