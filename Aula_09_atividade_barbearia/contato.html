<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Avenida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="img/Captura de tela 2023-10-26 170031.png" alt="" class="logobarbearia">
        <nav>
            <a href="home.html">Home</a>
            <a href="servicos.html">Serviços</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>
    <section class="conteudopagcontato">
        <fieldset class="contatoforms">    
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Fulano de Tal">
                <label for="email">E-mail:</label>
                <input type="email" id="email" email="email" placeholder="seuemail@dominio.com">
                <label for="telefone">Telefone:</label>
                <input type="number" id="telefone" name="telefone" placeholder="(xx)xxxxx-xxxx">
                <label for="turno">Qual horário prefere ser atendido?</label>
                <select name="turno" class="turno">
                    <option value="manha">Manhã</option>
                    <option value="tarde">Tarde</option>
                </select>
                <input type="button" value="Enviar" class="enviarbutton">
        </fieldset>
        <table class="tabelinha">
            <tr>
                <td>Dia</td> <td>Horário</td>
            </tr>
            <tr>
                <td>Segunda</td> <td>8h - 20h</td>
            </tr>
            <tr>
                <td>Quarta</td> <td>8h - 20h</td>
            </tr>
            <tr>
                <td>Sexta</td> <td>8h - 20h</td>
            </tr>
        </table>
    </section>
    <footer>
        <img src="img/Captura de tela 2023-10-26 170031.png" alt="" class="logobarbeariafooter">
        <h3>© Barbearia Avenida - 2023</h3>
    </footer>
</body>
</html>
