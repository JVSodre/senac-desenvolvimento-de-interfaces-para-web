<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Arthur page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="brasaobrasil"></div>
    <div class="divizao">
        <nav class="nomeeidade">
            <h1>Arthur Viscardi</h1>
            <div class="espacoentre"></div>
            <h2 class="minidescricao">Membro honorário da Terra desde 2006</h2>
        </nav>
        <div class="fotoarthur">
            <img src="fotografia.png" alt="Foto do Arthur">
        </div>
        <div class="descricao"></div>
        <div class="gostos"></div>
        <div class="status">
            <div class="forca">
                <h2>💪 Força: 6/10</h2>
            </div>
            <div class="inteligencia">
                <h2>🧠 Inteligência: 7/10</h2>
            </div>
            <div class="agilidade">
                <h2>⚡ Agilidade: 9/10</h2>
            </div>
            <div class="carisma">
                <h2>🗣️ Carisma: 9/10</h2>
            </div>
            <div class="romantico">
                <h2>💘 Romântico: 10/10</h2>
            </div>
            <div class="vontadefumar">
                <h2>🚬 Vontade de fumar: 9/10</h2>
            </div>
        </div>
    </div>
</body>
</html>
