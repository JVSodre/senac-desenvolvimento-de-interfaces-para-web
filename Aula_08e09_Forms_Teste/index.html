<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Formulário de Contato</h1>
    <form action="" class="formularioprincipal">
        <fieldset class="fieldsetformprincipal">
            <div class="nome">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Insira o seu primeiro nome">
            </div>
            <div class="email">
                <label for="email">E-mail:</label>
                <input type="email" id="email" email="email" placeholder="exemplo@email.com">
            </div>
            <div class="senha">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" placeholder="Insira sua senha">
            </div>
            <div class="datanascimento">
                <label for="datanascimento">Data de Nascimento:</label>
                <input type="date" id="datanascimento" name="datanascimento">
            </div>
            <div class="feedback">
                <label for="feedback">Feedback:</label>
                <textarea name="" id="feedback" cols="30" rows="10" placeholder="Gostaria de deixar uma sugestão?"></textarea>
            </div>
            <div class="enviarlimpar">
                <input type="submit" value="Enviar" id="enviar">
                <input type="reset" value="Limpar" id="limpar">
            </div>
        </fieldset>
    </form>
</body>
</html>
